<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<button id="logout-button" class="logout-button">Logout</button>

<h1>Admin Dashboard</h1>
<p class="subtitle">Pilates Studio System Overview</p>

<h2 id="welcome-text">Welcome!</h2>

<!-- ================= TOP SUMMARY ================= -->
<div class="admin-summary-grid">
    <div class="admin-card">
        <h2>System Health</h2>
        <div id="health-info"></div>
    </div>

    <div class="admin-card">
        <h2>Booking Metrics</h2>
        <div id="metrics-info"></div>
    </div>
</div>

<!-- ================= ADD CLASS ================= -->
<div class="admin-section">
    <h2>Add New Class</h2>

    <p>
        <label>Date</label><br>
        <input type="date" id="new-class-date">
    </p>

    <p>
        <label>Time</label><br>
        <select id="new-class-time" class="admin-select"></select>
    </p>

    <p>
        <label>Instructor</label><br>
        <select id="new-class-instructor" class="admin-select"></select>
    </p>

    <p>
        <label>Capacity</label><br>
        <input type="number" id="new-class-capacity" value="10" min="1">
    </p>

    <button class="action-button" onclick="addNewClass()">
        Add Class
    </button>
</div>

<!-- ================= CLASS TABLE ================= -->
<div class="admin-section">
    <h2>Class Overview</h2>

    <table>
        <thead>
        <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Instructor</th>
            <th>Capacity</th>
            <th>Available</th>
            <th>Waitlist</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="admin-classes-body"></tbody>
    </table>
</div>

<script>
    const userId = localStorage.getItem("userId");
    const firstName = localStorage.getItem("firstName");
    const role = localStorage.getItem("role");

    let instructors = [];

    if (!userId || role !== "Admin") {
        alert("Admin login required.");
        window.location.href = "/";
    }

    document.getElementById("welcome-text").textContent =
        `Welcome, ${firstName}!`;

    // ================= LOAD DATA =================
    Promise.all([
        fetch('/health').then(res => res.json()),
        fetch('/metrics').then(res => res.json()),
        fetch('/api/admin/instructors').then(res => res.json()),
        fetch('/schedule').then(res => res.json())
    ])
        .then(([healthData, metricsData, instructorData, scheduleData]) => {

            instructors = instructorData;

            loadTimeOptions();
            loadNewClassInstructorDropdown();

            // Health
            document.getElementById("health-info").innerHTML = `
            <p><strong>Status:</strong> ${healthData.status}</p>
            <p><strong>Service:</strong> ${healthData.service}</p>
            <p><strong>Database:</strong> ${healthData.database}</p>
            <p><strong>Timestamp:</strong> ${healthData.timestamp}</p>
        `;

            // Metrics
            document.getElementById("metrics-info").innerHTML = `
            <p><strong>Successful Bookings:</strong> ${metricsData.successfulBookings}</p>
            <p><strong>Failed Bookings:</strong> ${metricsData.failedBookings}</p>
            <p><strong>Average Booking Latency:</strong> ${metricsData.averageBookingLatencyMs.toFixed(2)} ms</p>
        `;

            loadClassTable(scheduleData);
        });

    // ================= TIME DROPDOWN =================
    function loadTimeOptions() {
        const select = document.getElementById("new-class-time");
        select.innerHTML = `<option value="">Select time</option>`;

        for (let hour = 8; hour <= 19; hour++) {
            [0, 15, 30, 45].forEach(minute => {
                const date = new Date();
                date.setHours(hour);
                date.setMinutes(minute);

                const formatted = date.toLocaleTimeString("en-US", {
                    hour: "numeric",
                    minute: "2-digit"
                });

                const option = document.createElement("option");
                option.value = formatted;
                option.textContent = formatted;

                select.appendChild(option);
            });
        }
    }

    // ================= INSTRUCTOR DROPDOWN =================
    function loadNewClassInstructorDropdown() {
        const select = document.getElementById("new-class-instructor");
        select.innerHTML = `<option value="">Select instructor</option>`;

        instructors.forEach(inst => {
            const option = document.createElement("option");
            option.value = inst.userId;
            option.textContent = `${inst.firstName} ${inst.lastName}`;
            select.appendChild(option);
        });
    }

    function buildInstructorDropdown(classId) {
        let options = `<option value="">Select instructor</option>`;

        instructors.forEach(inst => {
            options += `
                <option value="${inst.userId}">
                    ${inst.firstName} ${inst.lastName}
                </option>
            `;
        });

        return `
            <select id="instructor-select-${classId}" class="overview-select">
                ${options}
            </select>
        `;
    }

    // ================= TABLE =================
    function loadClassTable(data) {
        const tableBody = document.getElementById("admin-classes-body");
        tableBody.innerHTML = "";

        data.forEach(session => {
            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${session.classDate}</td>
                <td>${session.classTime}</td>
                <td>${session.instructorName}</td>
                <td>${session.classCapacity}</td>
                <td>${session.availableSpots}</td>
                <td>${session.waitlistCount}</td>
                <td>
                    <div class="admin-action-cell">

                        <button class="action-button cancel-button"
                                onclick="cancelClass(${session.classId})">
                            Cancel
                        </button>

                        ${buildInstructorDropdown(session.classId)}

                        <button class="action-button"
                                onclick="updateClassInstructor(${session.classId})">
                            Update
                        </button>

                    </div>
                </td>
            `;

            tableBody.appendChild(row);
        });
    }

    // ================= ACTIONS =================
    function addNewClass() {
        const classDate = document.getElementById("new-class-date").value;
        const classTime = document.getElementById("new-class-time").value;
        const instructorUserId = document.getElementById("new-class-instructor").value;
        const classCapacity = document.getElementById("new-class-capacity").value;

        if (!classDate || !classTime || !instructorUserId || !classCapacity) {
            alert("Fill all fields.");
            return;
        }

        fetch('/api/admin/classes', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                classDate,
                classTime,
                instructorUserId: Number(instructorUserId),
                classCapacity: Number(classCapacity)
            })
        })
            .then(res => res.text())
            .then(msg => {
                alert(msg);
                location.reload();
            });
    }

    function cancelClass(classId) {
        if (!confirm("Cancel class?")) return;

        fetch('/api/admin/classes/cancel', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({classId})
        })
            .then(res => res.text())
            .then(msg => {
                alert(msg);
                location.reload();
            });
    }

    function updateClassInstructor(classId) {
        const select = document.getElementById(`instructor-select-${classId}`);
        const instructorUserId = select.value;

        if (!instructorUserId) {
            alert("Select instructor.");
            return;
        }

        fetch('/api/admin/classes/update-instructor', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                classId,
                instructorUserId: Number(instructorUserId)
            })
        })
            .then(res => res.text())
            .then(msg => {
                alert(msg);
                location.reload();
            });
    }

    document.getElementById("logout-button").addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "/";
    });
</script>

</body>
</html>
