<!DOCTYPE html>
<html>
<head>
    <title>Schedule</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<a href="/" class="back-link">Back to Home</a>

<h1>Schedule</h1>
<p class="subtitle">Mat Pilates at San Jose Studio</p>

<div id="schedule-container"></div>

<script>
    function formatDate(dateString) {
        const date = new Date(dateString + "T00:00:00");

        return date.toLocaleDateString("en-US", {
            weekday: "long",
            month: "long",
            day: "numeric",
            year: "numeric"
        });
    }

    fetch('/schedule')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById("schedule-container");
            container.innerHTML = "";

            const grouped = {};

            data.forEach(session => {
                if (!grouped[session.classDate]) {
                    grouped[session.classDate] = [];
                }
                grouped[session.classDate].push(session);
            });

            Object.keys(grouped).forEach(date => {

                const section = document.createElement("div");
                section.className = "date-section";

                section.innerHTML = `
                    <h2 class="date-title">${formatDate(date)}</h2>

                    <table class="schedule-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Instructor</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="body-${date}"></tbody>
                    </table>
                `;

                container.appendChild(section);

                const tbody = document.getElementById(`body-${date}`);

                grouped[date].forEach(session => {
                    const row = document.createElement("tr");

                    const buttonLabel =
                        session.availableSpots > 0 ? "Reserve" : "Join Waitlist";

                    row.innerHTML = `
                        <td>
                            <div>${session.classTime}</div>
                            <div class="duration-text">45 mins</div>
                        </td>
                        <td>${session.instructorName}</td>
                        <td>
                            <button class="action-button"
                                    data-class-id="${session.classId}">
                                ${buttonLabel}
                            </button>
                        </td>
                    `;

                    tbody.appendChild(row);
                });
            });

            document.querySelectorAll(".action-button").forEach(button => {
                button.addEventListener("click", function () {

                    const classId = Number(
                        this.getAttribute("data-class-id")
                    );

                    fetch('/api/reservations', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            customerUserId: 1,
                            classId: classId
                        })
                    })
                        .then(response => response.text())
                        .then(message => {
                            alert(message);
                            location.reload();
                        })
                        .catch(error =>
                            console.error("Reservation error:", error)
                        );
                });
            });
        })
        .catch(error =>
            console.error("Error loading schedule:", error)
        );
</script>

</body>
</html>
