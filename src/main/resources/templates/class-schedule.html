<!DOCTYPE html>
<html>
<head>
    <title>Schedule</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<a href="/home" class="back-link">Back to Home</a>

<h1>Schedule</h1>
<p class="subtitle">Mat Pilates at San Jose Studio</p>

<div id="schedule-container"></div>

<script>
    function formatDate(dateString) {
        const date = new Date(dateString + "T00:00:00");

        return date.toLocaleDateString("en-US", {
            weekday: "long",
            month: "long",
            day: "numeric",
            year: "numeric"
        });
    }

    fetch('/schedule')
        .then(response => response.json())
        .then(async data => {

            const userId = localStorage.getItem("userId");

            if (!userId) {
                alert("Please login first.");
                window.location.href = "/";
                return;
            }

            const reservationsResponse =
                await fetch(`/api/reservations/customer/${userId}`);

            const reservationsData =
                await reservationsResponse.json();

            const waitlistResponse =
                await fetch(`/api/waitlist/customer/${userId}`);

            const waitlistData =
                await waitlistResponse.json();

            const userReservations = reservationsData
                .filter(r => r.status === "Booked")
                .map(r => ({
                    classId: r.classId,
                    reservationId: r.reservationId
                }));

            const userWaitlist = waitlistData
                .filter(w => w.status === "Waiting")
                .map(w => w.classId);

            const container = document.getElementById("schedule-container");
            container.innerHTML = "";

            const grouped = {};

            data.forEach(session => {
                if (!grouped[session.classDate]) {
                    grouped[session.classDate] = [];
                }
                grouped[session.classDate].push(session);
            });

            Object.keys(grouped).forEach(date => {

                const section = document.createElement("div");
                section.className = "date-section";

                section.innerHTML = `
                <h2 class="date-title">${formatDate(date)}</h2>

                <table class="schedule-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Instructor</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="body-${date}"></tbody>
                </table>
            `;

                container.appendChild(section);

                const tbody = document.getElementById(`body-${date}`);

                grouped[date].forEach(session => {

                    const reservation = userReservations.find(
                        r => r.classId === session.classId
                    );

                    const alreadyReserved = reservation !== undefined;
                    const alreadyWaitlisted = userWaitlist.includes(session.classId);

                    let buttonHtml = "";

                    if (alreadyReserved) {
                        buttonHtml = `
                        <button class="action-button reserved-button" disabled>
                            Reserved
                        </button>

                        <button class="action-button cancel-button"
                                data-reservation-id="${reservation.reservationId}">
                            Cancel
                        </button>
                    `;
                    } else if (alreadyWaitlisted) {
                        const waitlistEntry = waitlistData.find(
                            w => w.classId === session.classId && w.status === "Waiting"
                        );

                        buttonHtml = `
                            <button class="action-button reserved-button" disabled>
                                Waitlisted
                            </button>

                            <button class="action-button cancel-button leave-waitlist-button"
                                    data-waitlist-id="${waitlistEntry.waitlistId}">
                                Leave
                            </button>
                        `;
                    } else {
                        const buttonLabel =
                            Number(session.availableSpots) > 0
                                ? "Reserve"
                                : "Join Waitlist";

                        buttonHtml = `
                        <button class="action-button reserve-button"
                                data-class-id="${session.classId}">
                            ${buttonLabel}
                        </button>
                    `;
                    }

                    const row = document.createElement("tr");

                    row.innerHTML = `
                    <td>
                        <div>${session.classTime}</div>
                        <div class="duration-text">45 mins</div>
                    </td>

                    <td>${session.instructorName}</td>

                    <td>${buttonHtml}</td>
                `;

                    tbody.appendChild(row);
                });
            });

            document.querySelectorAll(".reserve-button").forEach(button => {
                button.addEventListener("click", function () {
                    const classId = Number(this.getAttribute("data-class-id"));

                    fetch('/api/reservations', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            customerUserId: Number(userId),
                            classId: classId
                        })
                    })
                        .then(response => response.text())
                        .then(message => {
                            alert(message);
                            location.reload();
                        });
                });
            });

            document.querySelectorAll(".cancel-button").forEach(button => {
                if (button.classList.contains("leave-waitlist-button")) {
                    return;
                }

                button.addEventListener("click", function () {
                    const reservationId = this.getAttribute("data-reservation-id");
                    window.location.href =
                        `/cancel-reservation?reservationId=${reservationId}`;
                });
            });

            document.querySelectorAll(".leave-waitlist-button").forEach(button => {
                button.addEventListener("click", function () {
                    const waitlistId = this.getAttribute("data-waitlist-id");

                    fetch('/api/waitlist/leave', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            waitlistId: Number(waitlistId),
                            customerUserId: Number(userId)
                        })
                    })
                        .then(response => response.text())
                        .then(message => {
                            alert(message);
                            location.reload();
                        });
                });
            });
        })
        .catch(error =>
            console.error("Error loading schedule:", error)
        );
</script>

</body>
</html>
