<!DOCTYPE html>
<html>
<head>
    <title>Instructor Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<button id="logout-button" class="logout-button">Logout</button>

<h1>Instructor Dashboard</h1>
<p class="subtitle">Assigned Pilates Classes</p>

<h2 id="welcome-text">Welcome!</h2>

<table>
    <thead>
    <tr>
        <th>Date</th>
        <th>Time</th>
        <th>Capacity</th>
        <th>Booked</th>
        <th>Waitlist</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="instructor-classes-body"></tbody>
</table>

<script>
    const userId = localStorage.getItem("userId");
    const firstName = localStorage.getItem("firstName");
    const role = localStorage.getItem("role");

    if (!userId || role !== "Instructor") {
        alert("Instructor login required.");
        window.location.href = "/";
    }

    document.getElementById("welcome-text").textContent =
        `Welcome, ${firstName}!`;

    fetch(`/schedule/instructor/${userId}`)
        .then(response => response.json())
        .then(data => {
            const tableBody = document.getElementById("instructor-classes-body");
            tableBody.innerHTML = "";

            data.forEach(session => {
                const booked = session.classCapacity - session.availableSpots;
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${session.classDate}</td>
                    <td>${session.classTime}</td>
                    <td>${session.classCapacity}</td>
                    <td>${booked}</td>
                    <td>${session.waitlistCount}</td>
                    <td>
                        <button class="action-button view-students-button" data-class-id="${session.classId}">
                            View Students
                        </button>
                    </td>
                `;

                tableBody.appendChild(row);
            });

            document.querySelectorAll(".view-students-button").forEach(button => {
                button.addEventListener("click", function () {
                    const classId = this.getAttribute("data-class-id");
                    loadStudents(classId, this);
                });
            });
        })
        .catch(error => console.error("Error loading instructor classes:", error));

    function loadStudents(classId, button) {
        const currentRow = button.closest("tr");

        const existingRow = document.getElementById(`students-row-${classId}`);

        // If already open → collapse
        if (existingRow) {
            existingRow.remove();
            button.textContent = "View Students";
            return;
        }

        // Otherwise → open
        fetch(`/schedule/classes/${classId}/students`)
            .then(response => response.json())
            .then(data => {
                const studentRow = document.createElement("tr");
                studentRow.id = `students-row-${classId}`;

                const names = data.students.map(student =>
                    `<p>${student.firstName} ${student.lastName}</p>`
                ).join("");

                studentRow.innerHTML = `
                <td colspan="6">
                    <div class="student-list-box">
                        <strong>Student List</strong>
                        ${names}
                    </div>
                </td>
            `;

                currentRow.insertAdjacentElement("afterend", studentRow);

                // Change button text
                button.textContent = "Hide Students";
            })
            .catch(error => console.error("Error loading students:", error));
    }

    document.getElementById("logout-button").addEventListener("click", function () {
        localStorage.clear();
        window.location.href = "/";
    });
</script>

</body>
</html>
